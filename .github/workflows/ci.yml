name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package + test deps
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pytest

      - name: Run tests
        run: python -m pytest -q

      - name: Run eval suite (against bundled fixture)
        run: python evals/run.py

      - name: Smoke check the CLI
        run: |
          llm-obs aggregate fixtures/production-1hour.jsonl --json > /dev/null
          llm-obs windows fixtures/production-1hour.jsonl --minutes 10 --json > /dev/null
          # Alerts will exit non-zero because the bundled fixture intentionally fires opus_cost_spike
          llm-obs alerts fixtures/production-1hour.jsonl --json > /dev/null || true
          llm-obs record-sample --out /tmp/sample.jsonl
          llm-obs demo
